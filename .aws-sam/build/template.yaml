AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ride the Bus Flask API on Lambda with API Gateway
Globals:
  Function:
    Timeout: 60
    Runtime: python3.11
    Architectures:
    - x86_64
    EphemeralStorage:
      Size: 1024
Resources:
  RideTheBusApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ride-the-bus-api
      Description: Flask API for Ride the Bus game
      CodeUri: RideTheBusApiFunction
      Handler: lambda_handler.handler
      MemorySize: 1024
      Environment:
        Variables:
          PYTHONPATH: /var/task/backend:/var/task/ridethebus-react/ridethebus
      Layers:
      - Ref: TensorflowLayer
      - Ref: FlaskLayer
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId:
              Ref: GameApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      SamResourceId: RideTheBusApiFunction
  TensorflowLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ride-the-bus-tensorflow
      Description: TensorFlow and NumPy for ML inference
      ContentUri: ..\..\backend\layers\tensorflow
      CompatibleRuntimes:
      - python3.11
      RetentionPolicy: Delete
  FlaskLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ride-the-bus-flask
      Description: Flask, CORS, and utilities
      ContentUri: ..\..\backend\layers\flask
      CompatibleRuntimes:
      - python3.11
      RetentionPolicy: Delete
  GameApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Name: ride-the-bus-api
      Description: API Gateway for Ride the Bus Flask app
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
        MaxAge: '''600'''
Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
    - dev
    - prod
    Description: Environment name
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for Ride the Bus API
    Value:
      Fn::Sub: https://${GameApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: RideTheBusApiUrl
  FunctionArn:
    Description: Lambda Function ARN
    Value:
      Fn::GetAtt:
      - RideTheBusApiFunction
      - Arn
    Export:
      Name: RideTheBusApiArn
  ApiId:
    Description: API Gateway API ID
    Value:
      Ref: GameApi
    Export:
      Name: RideTheBusApiId
